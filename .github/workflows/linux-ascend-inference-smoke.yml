name: Linux Ascend Inference Smoke Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  linux-ascend-inference-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_ENDPOINT: ${{ vars.HF_ENDPOINT || 'https://hf-mirror.com' }}
      HF_HOME: ${{ github.workspace }}/../.hf-cache
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/../.hf-cache/hub
      TRANSFORMERS_CACHE: ${{ github.workspace }}/../.hf-cache/transformers
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TARGET_REPO_URL: https://github.com/${{ github.repository }}.git
      TARGET_REPO_SHA: ${{ github.sha }}
      VLLM_ASCEND_HUST_REPO_URL: https://github.com/vLLM-HUST/vllm-ascend-hust.git
      VLLM_ASCEND_HUST_REPO_REF: 69421a87346e041d692d370ca476d978bfee86ae
      VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust

    steps:
      - name: Checkout target repo with retry
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_sha=$3
            local attempts=4
            local delay_seconds=15
            local try=1
            local parent_dir
            local temp_dir

            parent_dir=$(dirname "$target_dir")
            temp_dir="${parent_dir}/.checkout-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            mkdir -p "$parent_dir"
            rm -rf "$temp_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$temp_dir"; then
                if ! git -C "$temp_dir" rev-parse --verify --quiet "$target_sha^{commit}" >/dev/null; then
                  git -C "$temp_dir" fetch --depth 1 origin "$target_sha"
                fi
                git -C "$temp_dir" checkout --force "$target_sha"
                rm -rf "$target_dir"
                mv "$temp_dir" "$target_dir"
                return 0
              fi

              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$temp_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$TARGET_REPO_URL" "$GITHUB_WORKSPACE" "$TARGET_REPO_SHA"

      - name: Checkout vllm-ascend-hust repo with retry
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_ref=$3
            local attempts=4
            local delay_seconds=15
            local try=1

            rm -rf "$target_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$target_dir"; then
                if ! git -C "$target_dir" rev-parse --verify --quiet "$target_ref^{commit}" >/dev/null; then
                  git -C "$target_dir" fetch --depth 1 origin "$target_ref"
                fi
                git -C "$target_dir" checkout --force "$target_ref"
                return 0
              fi

              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$target_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$VLLM_ASCEND_HUST_REPO_URL" "$VLLM_ASCEND_HUST_REPO" "$VLLM_ASCEND_HUST_REPO_REF"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Hugging Face cache directories
        run: |
          mkdir -p "$HF_HOME" "$HUGGINGFACE_HUB_CACHE" "$TRANSFORMERS_CACHE"
          chmod 700 "$HF_HOME"
          echo "HF endpoint: $HF_ENDPOINT"
          echo "HF home: $HF_HOME"
          if [[ -n "${HF_TOKEN:-}" ]]; then
            echo "HF token: configured"
          else
            echo "HF token: not configured"
          fi

      - name: Run Ascend hosted install checks
        run: |
          bash -n "$VLLM_ASCEND_HUST_REPO/scripts/use_single_ascend_env.sh"
          bash -n "$VLLM_ASCEND_HUST_REPO/scripts/install_local_ascend_plugin.sh"
          python -m compileall "$VLLM_ASCEND_HUST_REPO/vllm_ascend"
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          ascend_repo = Path(os.environ["VLLM_ASCEND_HUST_REPO"]).resolve()

          vllm_pyproject = tomllib.loads((workspace / "pyproject.toml").read_text())
          ascend_setup = (ascend_repo / "setup.py").read_text()

          if vllm_pyproject["project"]["name"] != "vllm-hust":
              raise SystemExit("Unexpected vllm-hust project metadata")

          if 'name="vllm-ascend-hust"' not in ascend_setup:
              raise SystemExit("Unexpected vllm-ascend-hust setup metadata")

          if '"vllm.platform_plugins": ["ascend = vllm_ascend:register"]' not in ascend_setup:
              raise SystemExit("Ascend plugin entry point is missing or malformed")

          expected_paths = [
              workspace / ".github/workflows/scripts/run_e2e_serve_smoke.sh",
              ascend_repo / "scripts/use_single_ascend_env.sh",
              ascend_repo / "scripts/install_local_ascend_plugin.sh",
              ascend_repo / "vllm_ascend/worker/worker.py",
          ]
          missing_paths = [str(path) for path in expected_paths if not path.exists()]
          if missing_paths:
              raise SystemExit(f"Missing expected Ascend integration files: {missing_paths}")

          print(f"Validated vllm-hust checkout: {workspace}")
          print(f"Validated vllm-ascend-hust checkout: {ascend_repo}")
          print("Validated Ascend plugin metadata and hosted-runner install prerequisites.")
          PY

      - name: Summarize hosted smoke mode
        run: |
          echo "Python: $(python --version)"
          {
            echo "Ascend runtime smoke is intentionally skipped on ubuntu-latest."
            echo "This workflow now validates Ascend plugin metadata, shell-script syntax, and hosted-runner install prerequisites only."
            echo "Real Ascend runtime coverage remains in self-hosted jobs such as the benchmark workflow."
          } >> "$GITHUB_STEP_SUMMARY"