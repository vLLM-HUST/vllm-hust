name: macOS Apple Silicon Smoke Test

on:
  schedule:
    # Daily at 2:30 AM UTC
    - cron: '30 2 * * *'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  macos-m1-smoke-test:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_ENDPOINT: ${{ vars.HF_ENDPOINT || 'https://hf-mirror.com' }}
      HF_HOME: ${{ github.workspace }}/../.hf-cache
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/../.hf-cache/hub
      TRANSFORMERS_CACHE: ${{ github.workspace }}/../.hf-cache/transformers
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.1

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements/**/*.txt
            pyproject.toml
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/../.hf-cache
          key: ${{ runner.os }}-hf-facebook-opt-125m

      - name: Prepare Hugging Face cache directories
        run: |
          mkdir -p "$HF_HOME" "$HUGGINGFACE_HUB_CACHE" "$TRANSFORMERS_CACHE"
          chmod 700 "$HF_HOME"
          echo "HF endpoint: $HF_ENDPOINT"
          echo "HF home: $HF_HOME"
          if [[ -n "${HF_TOKEN:-}" ]]; then
            echo "HF token: configured"
          else
            echo "HF token: not configured"
          fi

      - name: Create virtual environment
        run: |
          uv venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies and build vLLM
        env:
          VLLM_TARGET_DEVICE: cpu
        run: |
          uv pip install -r requirements/cpu.txt --index-strategy unsafe-best-match
          uv pip install -e .

      - name: Verify installation
        run: |
          python -c "import vllm; print(f'vLLM version: {vllm.__version__}')"

      - name: Run real-model serve smoke test
        env:
          MODEL_NAME: facebook/opt-125m
        run: bash .github/workflows/scripts/run_e2e_serve_smoke.sh
