name: Linux CPU E2E Smoke Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  linux-cpu-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      VLLM_TARGET_DEVICE: cpu
      VLLM_CPU_KVCACHE_SPACE: "8"
      VLLM_CPU_NUM_OF_RESERVED_CPU: "1"

    steps:
      - uses: actions/checkout@v6.0.1

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements/**/*.txt
            pyproject.toml
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-facebook-opt-125m

      - name: Create virtual environment
        run: |
          uv venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies and build vLLM
        run: |
          uv pip install -r requirements/cpu.txt --index-strategy unsafe-best-match
          uv pip install -e .

      - name: Verify installation
        run: |
          python -c "import vllm; print(f'vLLM version: {vllm.__version__}')"

      - name: Run real-model serve smoke test
        env:
          MODEL_NAME: facebook/opt-125m
        run: bash .github/workflows/scripts/run_e2e_serve_smoke.sh