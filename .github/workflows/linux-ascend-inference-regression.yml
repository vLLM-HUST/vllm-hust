name: Linux Ascend Inference Regression

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  linux-ascend-inference-regression:
    runs-on:
      - self-hosted
      - linux-aarch64-a2b3-0
      - docker
      - ascend-regression
    timeout-minutes: 45
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_ENDPOINT: ${{ vars.HF_ENDPOINT || 'https://hf-mirror.com' }}
      HF_HOME: ${{ github.workspace }}/../.hf-cache
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/../.hf-cache/hub
      TRANSFORMERS_CACHE: ${{ github.workspace }}/../.hf-cache/transformers
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TARGET_REPO_URL: git@github.com:${{ github.repository }}.git
      TARGET_REPO_SHA: ${{ github.sha }}
      VLLM_ASCEND_HUST_REPO_URL: git@github.com:vLLM-HUST/vllm-ascend-hust.git
      VLLM_ASCEND_HUST_REPO_REF: eb157681731da8ce28982cf7039ea4460eb8e64f
      VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust

    steps:
      - name: Configure GitHub SSH checkout
        env:
          VLLM_HUST_BENCHMARK_SSH_KEY: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${VLLM_HUST_BENCHMARK_SSH_KEY}" ]]; then
            echo "VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY is required for git@github.com checkout." >&2
            exit 2
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          key_file="$HOME/.ssh/vllm_hust_benchmark_key"
          printf '%s\n' "$VLLM_HUST_BENCHMARK_SSH_KEY" > "$key_file"
          chmod 600 "$key_file"

          known_hosts_tmp="$(mktemp)"
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com > "$known_hosts_tmp" 2>/dev/null
          if [[ ! -s "$known_hosts_tmp" ]]; then
            echo "Unable to scan github.com host keys." >&2
            exit 2
          fi
          cat "$known_hosts_tmp" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          cat > "$HOME/.ssh/config" <<EOF
          Host github.com
            HostName github.com
            User git
            IdentityFile $key_file
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 "$HOME/.ssh/config"

          ssh_output="$(ssh -o BatchMode=yes -T git@github.com 2>&1)" && ssh_status=$? || ssh_status=$?
          echo "$ssh_output"
          if [[ "$ssh_output" == *"Permission denied"* ]]; then
            echo "GitHub SSH authentication failed for the configured key." >&2
            exit 2
          fi
          if [[ "$ssh_status" -ne 0 && "$ssh_status" -ne 1 ]]; then
            echo "GitHub SSH probe failed with status $ssh_status." >&2
            exit "$ssh_status"
          fi

      - name: Checkout target repo with retry
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_sha=$3
            local attempts=4
            local delay_seconds=15
            local try=1
            local parent_dir
            local temp_dir

            parent_dir=$(dirname "$target_dir")
            temp_dir="${parent_dir}/.checkout-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            mkdir -p "$parent_dir"
            rm -rf "$temp_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$temp_dir"; then
                if ! git -C "$temp_dir" rev-parse --verify --quiet "$target_sha^{commit}" >/dev/null; then
                  git -C "$temp_dir" fetch --depth 1 origin "$target_sha"
                fi
                git -C "$temp_dir" checkout --force "$target_sha"
                rm -rf "$target_dir"
                mv "$temp_dir" "$target_dir"
                return 0
              fi

              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$temp_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$TARGET_REPO_URL" "$GITHUB_WORKSPACE" "$TARGET_REPO_SHA"

      - name: Checkout pinned vllm-ascend-hust with retry
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_sha=$3
            local attempts=4
            local delay_seconds=15
            local try=1
            local parent_dir
            local temp_dir

            parent_dir=$(dirname "$target_dir")
            temp_dir="${parent_dir}/.checkout-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-ascend"

            mkdir -p "$parent_dir"
            rm -rf "$temp_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$temp_dir"; then
                if ! git -C "$temp_dir" rev-parse --verify --quiet "$target_sha^{commit}" >/dev/null; then
                  git -C "$temp_dir" fetch --depth 1 origin "$target_sha"
                fi
                git -C "$temp_dir" checkout --force "$target_sha"
                rm -rf "$target_dir"
                mv "$temp_dir" "$target_dir"
                return 0
              fi

              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$temp_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$VLLM_ASCEND_HUST_REPO_URL" "$VLLM_ASCEND_HUST_REPO" "$VLLM_ASCEND_HUST_REPO_REF"

      - name: Prepare Hugging Face cache directories
        run: |
          mkdir -p "$HF_HOME" "$HUGGINGFACE_HUB_CACHE" "$TRANSFORMERS_CACHE"
          chmod 700 "$HF_HOME"
          echo "HF endpoint: $HF_ENDPOINT"
          echo "HF home: $HF_HOME"
          if [[ -n "${HF_TOKEN:-}" ]]; then
            echo "HF token: configured"
          else
            echo "HF token: not configured"
          fi

      - name: Prepare Ascend runtime and install current checkout
        env:
          COMPILE_CUSTOM_KERNELS: "1"
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          bash "${VLLM_ASCEND_HUST_REPO}/scripts/install_local_ascend_plugin.sh" "$VLLM_ASCEND_HUST_REPO"
          python -m pip install -e . --no-build-isolation --no-deps

      - name: Verify installation
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          python --version
          python - <<'PY'
          import os
          from pathlib import Path

          import vllm
          import vllm_ascend

          expected_repo = Path(os.environ["VLLM_ASCEND_HUST_REPO"]).resolve()
          vllm_ascend_path = Path(vllm_ascend.__file__).resolve()

          print(f"vLLM version: {vllm.__version__}")
          print(f"vLLM module path: {Path(vllm.__file__).resolve()}")
          print(f"vllm_ascend module path: {vllm_ascend_path}")

          if expected_repo not in vllm_ascend_path.parents:
              raise SystemExit(
                  "vllm_ascend was not imported from the checked-out workspace: "
                  f"{vllm_ascend_path} (expected under {expected_repo})"
              )
          PY

      - name: Run real inference regression checks
        env:
          COMPILE_CUSTOM_KERNELS: "1"
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
          MODEL_NAME: Qwen/Qwen2.5-0.5B-Instruct
          DTYPE: bfloat16
          MAX_MODEL_LEN: "256"
          MAX_NUM_SEQS: "1"
          PROMPT: The capital of France is
          CHAT_MESSAGE: Tell me one short fact about France.
          MAX_TOKENS: "8"
          BENCH_NUM_PROMPTS: "5"
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          bash .github/workflows/scripts/run_e2e_inference_regression.sh

      - name: Cleanup leftover Ascend CI processes
        if: always()
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          bash .github/workflows/scripts/cleanup_ascend_ci_processes.sh